<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Review System</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'http://localhost:3001/api';

    // Login Component
    function Login({ onLogin }) {
      const [email, setEmail] = useState('student@demo.com');
      const [password, setPassword] = useState('123');
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('user', JSON.stringify(data));
            onLogin(data);
          } else {
            setError(data.error);
          }
        } catch (err) {
          setError('Server not running. Start server on port 3001');
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
            <h1 className="text-3xl font-bold text-center text-indigo-600 mb-2">Submission System</h1>
            <p className="text-gray-500 text-center mb-6">Review and Feedback Platform</p>
            
            {error && (
              <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {error}
              </div>
            )}
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                  required
                />
              </div>
              <button type="submit" className="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
                Sign In
              </button>
            </form>
            
            <div className="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
              <p className="font-semibold mb-2">Demo Credentials:</p>
              <p>Student: student@demo.com / 123</p>
              <p>Mentor: mentor@demo.com / 123</p>
              <p>Admin: admin@demo.com / 123</p>
            </div>
          </div>
        </div>
      );
    }

    // Dashboard Component
    function Dashboard({ user, onLogout }) {
      const [submissions, setSubmissions] = useState([]);
      const [view, setView] = useState('list');
      const [selected, setSelected] = useState(null);
      const [newSubmission, setNewSubmission] = useState({ title: '', description: '', deadline: '' });
      const [stats, setStats] = useState({ total: 0, pending: 0, approved: 0, rejected: 0 });

      useEffect(() => {
        fetchSubmissions();
        if (user.role !== 'student') fetchStats();
      }, []);

      const fetchSubmissions = async () => {
        try {
          const res = await fetch(`${API_URL}/submissions`, {
            headers: { 'user-id': user.id }
          });
          const data = await res.json();
          setSubmissions(data);
        } catch (err) {
          console.error('Error fetching:', err);
        }
      };

      const fetchStats = async () => {
        try {
          const res = await fetch(`${API_URL}/stats`);
          const data = await res.json();
          setStats(data);
        } catch (err) {}
      };

      const handleCreate = async (e) => {
        e.preventDefault();
        try {
          await fetch(`${API_URL}/submissions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'user-id': user.id },
            body: JSON.stringify(newSubmission)
          });
          setNewSubmission({ title: '', description: '', deadline: '' });
          setView('list');
          fetchSubmissions();
        } catch (err) {}
      };

      const handleReview = async (status) => {
        try {
          await fetch(`${API_URL}/submissions/${selected.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
          });
          setSelected(null);
          fetchSubmissions();
          fetchStats();
        } catch (err) {}
      };

      const getStatusColor = (status) => {
        const colors = {
          pending: 'bg-yellow-100 text-yellow-800',
          approved: 'bg-green-100 text-green-800',
          rejected: 'bg-red-100 text-red-800',
          'needs-revision': 'bg-orange-100 text-orange-800'
        };
        return colors[status] || 'bg-gray-100 text-gray-800';
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-white shadow-sm">
            <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
              <h1 className="text-xl font-bold text-gray-900">Submission Review System</h1>
              <div className="flex items-center gap-4">
                <span className="text-sm text-gray-600">{user.name} ({user.role})</span>
                <button onClick={onLogout} className="text-sm text-red-600 hover:text-red-800">Logout</button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">
            {user.role === 'student' && view === 'list' && (
              <button
                onClick={() => setView('create')}
                className="mb-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700"
              >
                + New Submission
              </button>
            )}

            {view === 'create' && (
              <div className="bg-white rounded-xl shadow p-6 mb-6">
                <h2 className="text-xl font-semibold mb-4">Create New Submission</h2>
                <form onSubmit={handleCreate} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input
                      type="text"
                      value={newSubmission.title}
                      onChange={(e) => setNewSubmission({...newSubmission, title: e.target.value})}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea
                      value={newSubmission.description}
                      onChange={(e) => setNewSubmission({...newSubmission, description: e.target.value})}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg h-24"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Deadline (optional)</label>
                    <input
                      type="date"
                      value={newSubmission.deadline}
                      onChange={(e) => setNewSubmission({...newSubmission, deadline: e.target.value})}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    />
                  </div>
                  <div className="flex gap-4">
                    <button type="submit" className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
                      Submit
                    </button>
                    <button type="button" onClick={() => setView('list')} className="text-gray-600 px-6 py-2">
                      Cancel
                    </button>
                  </div>
                </form>
              </div>
            )}

            {user.role !== 'student' && (
              <div className="grid grid-cols-4 gap-4 mb-6">
                <div className="bg-white rounded-xl shadow p-4">
                  <p className="text-sm text-gray-500">Total</p>
                  <p className="text-2xl font-bold">{stats.total}</p>
                </div>
                <div className="bg-white rounded-xl shadow p-4">
                  <p className="text-sm text-gray-500">Pending</p>
                  <p className="text-2xl font-bold text-yellow-600">{stats.pending}</p>
                </div>
                <div className="bg-white rounded-xl shadow p-4">
                  <p className="text-sm text-gray-500">Approved</p>
                  <p className="text-2xl font-bold text-green-600">{stats.approved}</p>
                </div>
                <div className="bg-white rounded-xl shadow p-4">
                  <p className="text-sm text-gray-500">Rejected</p>
                  <p className="text-2xl font-bold text-red-600">{stats.rejected}</p>
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl shadow overflow-hidden">
              <table className="w-full">
                <thead className="bg-gray-50">
                  <tr>
                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-600">Title</th>
                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-600">Student</th>
                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-600">Status</th>
                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-600">Date</th>
                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-600">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-200">
                  {submissions.map(sub => (
                    <tr key={sub.id} className="hover:bg-gray-50">
                      <td className="px-6 py-4">
                        <p className="font-medium text-gray-900">{sub.title}</p>
                        <p className="text-sm text-gray-500">{sub.description?.substring(0, 50)}...</p>
                      </td>
                      <td className="px-6 py-4 text-sm text-gray-600">Student</td>
                      <td className="px-6 py-4">
                        <span className={`px-3 py-1 rounded-full text-xs font-medium ${getStatusColor(sub.status)}`}>
                          {sub.status}
                        </span>
                      </td>
                      <td className="px-6 py-4 text-sm text-gray-500">
                        {new Date(sub.createdAt).toLocaleDateString()}
                      </td>
                      <td className="px-6 py-4">
                        <button
                          onClick={() => setSelected(sub)}
                          className="text-indigo-600 hover:text-indigo-800 text-sm font-medium"
                        >
                          View Details
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </main>

          {selected && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl max-w-2xl w-full p-6">
                <div className="flex justify-between items-start mb-4">
                  <h2 className="text-xl font-semibold">{selected.title}</h2>
                  <button onClick={() => setSelected(null)} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                </div>
                
                <div className="space-y-4 mb-6">
                  <div>
                    <p className="text-sm text-gray-500">Description</p>
                    <p className="text-gray-900">{selected.description}</p>
                  </div>
                  <div className="flex gap-4">
                    <div>
                      <p className="text-sm text-gray-500">Status</p>
                      <span className={`px-3 py-1 rounded-full text-xs font-medium ${getStatusColor(selected.status)}`}>
                        {selected.status}
                      </span>
                    </div>
                    <div>
                      <p className="text-sm text-gray-500">Deadline</p>
                      <p className="text-gray-900">{selected.deadline ? new Date(selected.deadline).toLocaleDateString() : 'Not set'}</p>
                    </div>
                  </div>
                </div>

                {user.role === 'mentor' && selected.status === 'pending' && (
                  <div className="border-t pt-4">
                    <p className="font-medium mb-2">Review Actions:</p>
                    <div className="flex gap-4">
                      <button onClick={() => handleReview('approved')} className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        Approve
                      </button>
                      <button onClick={() => handleReview('rejected')} className="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                        Reject
                      </button>
                      <button onClick={() => handleReview('needs-revision')} className="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600">
                        Request Revision
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Main App
    function App() {
      const [user, setUser] = useState(null);

      useEffect(() => {
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
        }
      }, []);

      const handleLogin = (userData) => setUser(userData);
      const handleLogout = () => {
        localStorage.removeItem('user');
        setUser(null);
      };

      return user ? <Dashboard user={user} onLogout={handleLogout} /> : <Login onLogin={handleLogin} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
